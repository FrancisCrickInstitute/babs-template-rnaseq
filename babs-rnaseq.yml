#babs/docs/{{genome}}.config.jinja
crick_fastq_prefix: /nemo/stp/babs/inputs/sequencing/data
crick_fastq_suffix: primary_data/*/fastq/*_R1_001.fastq.gz
nfcore: "-profile crick -resume -r 3.10.1"

#babs/nfcore/module.mk.jinja
scratch: "/flask/scratch/babs/${USER}/projects"
cache: /flask/apps/containers/all-singularity-images/
nextflow_bin: "module purge && module load Nextflow/23.10.0  Singularity/3.6.4; nextflow"
sqlite_bin: "module load SQLite/3.42.0-GCCcore-12.3.0; sqlite3"

#babs/differential/.env.local.jinja
singularity_imagedir: /flask/apps/containers/all-singularity-images
singularity_module: Singularity/3.11.3
singularityenv_renv_paths_root: "$(realpath /nemo/stp/babs/working/bioinformatics/caches/renv)"
singularityenv_uv_cache_dir: "$(realpath /nemo/stp/babs/working/bioinformatics/caches/uv)"


#copier.yml

genomes:
  GRCh38:
    genome_fasta: /nemo/svc/reference/Genomics/babs/homo_sapiens/ensembl/GRCh38/release-95/genome/Homo_sapiens.GRCh38.dna_sm.primary_assembly.fa
    gtf: /nemo/svc/reference/Genomics/babs/homo_sapiens/ensembl/GRCh38/release-95/gtf/Homo_sapiens.GRCh38.95.gtf
    org_db: org.Hs.eg.db
  GRCm38:
    genome_fasta: /nemo/svc/reference/Genomics/babs/mus_musculus/ensembl/GRCm38/release-95/genome/Mus_musculus.GRCm38.dna_sm.toplevel.fa
    gtf: /nemo/svc/reference/Genomics/babs/mus_musculus/ensembl/GRCm38/release-95/gtf/Mus_musculus.GRCm38.95.gtf
    org_db: org.Mm.eg.db

outputs_root: /nemo/stp/babs/outputs

linked_dir_prefixes:
  redirect_intranet: "/nemo/stp/babs/www/html/internal/users/${USER}/projects/"
  redirect_internet: "/nemo/stp/babs/www/html/external/users/${USER}/projects/"
  url_intranet: "https://bioinformatics.thecrick.org/users/${USER}/projects/"
  url_internet: "https//bioinformatics.crick.ac.uk/users/${USER}/projects/"

