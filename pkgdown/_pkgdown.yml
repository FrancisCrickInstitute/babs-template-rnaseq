title: RNASeq Template
template:
  bootstrap: 5
  bootswatch: yeti
  bslib:
    primary: "#4565ad"
navbar:
  structure:
    left:  [intro, reference, articles, demo, tutorials, news]
    right: [search, github]
  components:
    demo:
      text: "Demo"
      href: /test/index.html
reference:
- title: Utilities
- subtitle: "Partial Residuals"
  desc: >
    Functions for selectively removing the systematic effect of
    variables included in a predictive model, to allow patterns that
    might otherwise be obscured to become apparent.
- contents: 
  - has_concept("partial")
- subtitle: Dataset/Model/Comparison helpers
  desc: "Functions that help with handling either the three-layered list corresponding to 'spec' descriptions of comparisons, or a simple list of DESeqDataSet objects"
- contents:
    - ends_with("dmc")
    - starts_with("dmc")
- title: "Everything Else"
  desc: "Things yet to be categorised"
- contents:
  - -has_concept("partial")
- title: About the package
- contents: BABS.RNASeq  
home:
  links:
  - text: Demo Results
    href: /test/index.html

repo:
  url:
    home: https://github.com/FrancisCrickInstitute/babs-template-rnaseq
    source: https://github.com/FrancisCrickInstitute/babs-template-rnaseq/blob/master/babs/differential/
    issue: https://github.com/FrancisCrickInstitute/babs-template-rnaseq/issues/
    user: https://github.com/BABS-STP
    
